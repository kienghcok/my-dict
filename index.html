<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生字典查詢系統</title>
    <style>
        :root { --accent: #c0392b; --bg: #fdfdfd; --border: #eee; --shadow: 0 4px 12px rgba(0,0,0,0.15); }
        body { font-family: "PingFang TC", "Microsoft JhengHei", serif; max-width: 700px; margin: 0 auto; padding: 20px; background: #fff; line-height: 1.6; color: #333; }
        .sticky-top { position: sticky; top: 0; background: #fff; padding: 15px 0; border-bottom: 2px solid var(--border); z-index: 10; display: flex; align-items: center; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; font-size: 1.1rem; border: 2px solid #ddd; border-radius: 10px; outline: none; transition: border 0.3s; }
        input[type="text"]:focus { border-color: var(--accent); }
        .btn-settings { background: #f0f0f0; border: none; width: 45px; height: 45px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
        
        .variant-tags { display: inline-block; font-size: 0.9rem; font-weight: normal; margin-left: 15px; vertical-align: middle; }
        .tag-item { background: #f8f9fa; padding: 2px 8px; border-radius: 4px; border: 1px solid #eee; margin-right: 5px; }
        .dropdown { position: relative; }
        .dropdown-menu { position: absolute; right: 0; top: 55px; background: white; box-shadow: var(--shadow); border-radius: 8px; display: none; padding: 10px; min-width: 150px; z-index: 100; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        
        .result-item { border-bottom: 1px solid var(--border); padding: 20px 0; }
        .char-head { font-size: 2.5rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; flex-wrap: wrap; }
        .reading-box { margin-bottom: 8px; display: flex; align-items: baseline; gap: 8px; }
        .label-tag { font-size: 0.85rem; color: #888; white-space: nowrap; }
        .bopomofo { font-size: 1.2rem; font-weight: 500; color: #2c3e50; }
        .mean-text { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-top: 10px; white-space: pre-wrap; font-size: 0.95rem; }
        
        .opt-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .opt-title { font-weight: bold; margin-bottom: 8px; display: block; color: var(--accent); }
        label { display: inline-flex; align-items: center; margin-right: 15px; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="sticky-top">
    <input type="text" id="searchInput" placeholder="輸入單字..." onkeypress="if(event.key==='Enter') doSearch()">
    <div class="dropdown">
        <button class="btn-settings" onclick="toggleMenu(event)">⚙️</button>
        <div id="dropdownMenu" class="dropdown-menu">
            <div style="padding:10px; cursor:pointer;" onclick="openSettings()">推導設置</div>
            <div style="padding:10px; border-top:1px solid #eee; color:#c0392b; cursor:pointer;" onclick="location.reload()">重新整理</div>
        </div>
    </div>
</div>

<div id="results"></div>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal">
        <h3>音韻推導設置</h3>
        
        <div class="opt-group">
            <span class="opt-title">顯示方案</span>
            <label><input type="radio" name="displayMode" value="status" onchange="updateUI()"> 原始地位</label>
            <label><input type="radio" name="displayMode" value="bopomofo" checked onchange="updateUI()"> 推導拼讀</label>
            <label><input type="radio" name="displayMode" value="orig" onchange="updateUI()"> 原書讀音</label>
        </div>
        
        <div id="derivationOptions">
            <div class="opt-group">
                <span class="opt-title">注音方案</span>
                <label><input type="radio" name="phoneticScheme" value="zhuyin"> 注音符號</label>
                <label><input type="radio" name="phoneticScheme" value="roma" checked> 漢語拼音</label>
                <label><input type="radio" name="phoneticScheme" value="ipa"> 國際音標</label>
            </div>

            <div class="opt-group">
                <span class="opt-title">聲母演變</span>
                <label><input type="checkbox" class="opt" data-key="dropVng" checked> 疑微脫落</label>
                <label><input type="checkbox" class="opt" data-key="palatalization" checked> 見系顎化</label>
                <label><input type="checkbox" class="opt" data-key="dropFw" checked> 輕唇不合</label>
                <label><input type="checkbox" class="opt" data-key="riToEr" checked> 日母兒化</label>
            </div>

            <div class="opt-group">
                <span class="opt-title">韻母演變</span>
                <label><input type="checkbox" class="opt" data-key="zhuangSan" checked> 莊三化二</label>
                <label><input type="checkbox" class="opt" data-key="qiToI" checked> 齊韻歸支</label>
                <label><input type="checkbox" class="opt" data-key="mergeDongGeng" checked> 東庚合併</label> 
                <label><input type="checkbox" class="opt" data-key="mergeRuRime" checked> 入聲韻合併</label>
                <label><input type="checkbox" class="opt" data-key="simplifyShan" checked> 簡化山攝</label>
                <label><input type="checkbox" class="opt" data-key="mergeHamShan" checked> 咸攝入山</label>
            </div>

            <div class="opt-group">
                <span class="opt-title">聲調模式</span>
                <label><input type="radio" name="toneMode" value="8"> 八調</label>
                <label><input type="radio" name="toneMode" value="7"> 七調</label>
                <label><input type="radio" name="toneMode" value="6"> 六調</label>
                <label><input type="radio" name="toneMode" value="5" checked> 五調</label>
            </div>
        </div>

        <div style="text-align:right; margin-top:20px;">
            <button onclick="closeSettings()" style="padding:8px 20px; border:none; background:#ddd; border-radius:5px; cursor:pointer;">取消</button>
            <button onclick="saveAndSearch()" style="padding:8px 20px; border:none; background:var(--accent); color:white; border-radius:5px; cursor:pointer; margin-left:10px;">應用並儲存</button>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="config.js"></script>

<script>
function toggleMenu(e) { 
    e.stopPropagation(); 
    const m = document.getElementById('dropdownMenu'); 
    m.style.display = m.style.display === 'block' ? 'none' : 'block'; 
}

function openSettings() { document.getElementById('modalOverlay').style.display='flex'; updateUI(); }
function closeSettings() { document.getElementById('modalOverlay').style.display='none'; }

function updateUI() {
    const mode = document.querySelector('input[name="displayMode"]:checked').value;
    const derivationOptions = document.getElementById('derivationOptions');
    derivationOptions.style.display = (mode === 'bopomofo') ? 'block' : 'none';
}

window.onclick = () => { document.getElementById('dropdownMenu').style.display='none'; }

function getActiveOptions() {
    const opts = {};
    document.querySelectorAll('.opt').forEach(el => opts[el.dataset.key] = el.checked);
    opts.displayMode = document.querySelector('input[name="displayMode"]:checked').value;
    opts.phoneticScheme = document.querySelector('input[name="phoneticScheme"]:checked').value;
    const toneEl = document.querySelector('input[name="toneMode"]:checked');
    opts.toneMode = toneEl ? toneEl.value : "5";
    return opts;
}

function saveAndSearch() {
    localStorage.setItem('phon_cfg', JSON.stringify(getActiveOptions()));
    closeSettings();
    doSearch();
}

function doSearch() {
    const inputChar = document.getElementById('searchInput').value.trim();
    const resultContainer = document.getElementById('results');
    resultContainer.innerHTML = '';
    if (!inputChar) return;

    const opts = getActiveOptions();
    const mode = opts.displayMode;
    const fragment = document.createDocumentFragment();
    let found = false;

    [...inputChar].forEach(rawKey => {
        let keysToSearch = [rawKey];
        if (typeof VARIANT_MAP !== 'undefined' && VARIANT_MAP[rawKey]) {
            keysToSearch = keysToSearch.concat(VARIANT_MAP[rawKey]);
        }

        [...new Set(keysToSearch)].forEach(key => {
            const items = DICT_DATA[key];
            if (items) {
                found = true;
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'result-item';

                    let tags = [];
                    if (item.陸 && item.陸 !== '/' && item.陸 !== 'None') tags.push(`<span class="tag-item"><b style="color:#2980b9">【陸】</b>${item.陸}</span>`);
                    if (item.臺 && item.臺 !== '/' && item.臺 !== 'None') tags.push(`<span class="tag-item"><b style="color:#27ae60">【臺】</b>${item.臺}</span>`);
                    if (item.異 && item.異 !== '/' && item.異 !== 'None') tags.push(`<span class="tag-item"><b style="color:#e67e22">【異】</b>${item.異}</span>`);
                    const tagsHtml = tags.length ? `<div class="variant-tags">${tags.join(' ')}</div>` : '';

                    let html = `<div class="char-head">${key} ${tagsHtml}</div>`;

                    // --- 修改後的處理函數 ---
                    const process = (status) => {
                        if (!status || status === '/') return null;
                        if (status.includes('|')) return status.split('|').map(s => process(s)).join(' | ');
                        
                        // 檢查是否有「今讀」標記
                        const hasTodayMark = status.includes('今讀') || status.includes('今');
                        
                        // 清洗地位字串，去掉括號內容以便推導
                        let cleanStatus = status.replace(/（[^）]+）/g, '').replace(/\([^)]+\)/g, '').trim();
                        
                        let result = (typeof derivePhonology === 'function') ? derivePhonology(cleanStatus, opts) : status;
                        
                        // 如果原本有「今讀」，則在推導結果後加上標記
                        return hasTodayMark ? `${result} <small style="color:#888;">(今讀)</small>` : result;
                    };

                    if (mode === 'orig') {
                        html += `<div class="reading-box"><span class="label-tag">【讀音】</span><span class="bopomofo">${item.orig || '/'}</span></div>`;
                    } else if (mode === 'status') {
                        html += `<div class="reading-box"><span class="label-tag">【地位】</span><span class="bopomofo">${item.status || '/'}</span></div>`;
                        if (item.var && item.var !== '/') {
                            html += `<div class="reading-box"><span class="label-tag">【異地位】</span><span class="bopomofo">${item.var}</span></div>`;
                        }
                    } else {
                        const main = process(item.status);
                        if (main) html += `<div class="reading-box"><span class="label-tag">【讀音】</span><span class="bopomofo">${main}</span></div>`;
                        const v = process(item.var);
                        if (v) html += `<div class="reading-box"><span class="label-tag">【異讀】</span><span class="bopomofo">${v}</span></div>`;
                    }

                    html += `<div class="mean-text">${item.mean || '暫無釋義'}</div>`;
                    div.innerHTML = html;
                    fragment.appendChild(div);
                });
            }
        });
    });

    if (!found) {
        resultContainer.innerHTML = `<p style="padding:20px; color:#999;">未收錄「${inputChar}」。</p>`;
    } else {
        resultContainer.appendChild(fragment);
    }
}
// 頁面加載時自動讀取存檔
window.onload = () => {
    const saved = JSON.parse(localStorage.getItem('phon_cfg') || '{}');
    
    // 如果有存檔則讀取，否則保持 HTML 中的默認 checked 狀態
    if (saved.displayMode) {
        const radio = document.querySelector(`input[name="displayMode"][value="${saved.displayMode}"]`);
        if (radio) radio.checked = true;
    }
    if (saved.phoneticScheme) {
        const radio = document.querySelector(`input[name="phoneticScheme"][value="${saved.phoneticScheme}"]`);
        if (radio) radio.checked = true;
    }
    if (saved.toneMode) {
        const radio = document.querySelector(`input[name="toneMode"][value="${saved.toneMode}"]`);
        if (radio) radio.checked = true;
    }
    
    // 恢復所有勾選框 (若存檔中存在則覆蓋默認)
    document.querySelectorAll('.opt').forEach(el => {
        const key = el.dataset.key;
        if (saved.hasOwnProperty(key)) {
            el.checked = saved[key];
        }
    });

    updateUI();
};
</script>
</body>
</html>
