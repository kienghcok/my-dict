<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>еӯёз”ҹеӯ—е…ёжҹҘи©ўзі»зөұ</title>
    <style>
        :root { --accent: #c0392b; --bg: #fdfdfd; --border: #eee; --shadow: 0 4px 12px rgba(0,0,0,0.15); }
        body { font-family: "PingFang TC", "Microsoft JhengHei", serif; max-width: 700px; margin: 0 auto; padding: 20px; background: #fff; line-height: 1.6; color: #333; }
        .sticky-top { position: sticky; top: 0; background: #fff; padding: 15px 0; border-bottom: 2px solid var(--border); z-index: 10; display: flex; align-items: center; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; font-size: 1.1rem; border: 2px solid #ddd; border-radius: 10px; outline: none; transition: border 0.3s; }
        input[type="text"]:focus { border-color: var(--accent); }
        .btn-settings { background: #f0f0f0; border: none; width: 45px; height: 45px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
        
        .variant-tags { display: inline-block; font-size: 0.9rem; font-weight: normal; margin-left: 15px; vertical-align: middle; }
        .tag-item { background: #f8f9fa; padding: 2px 8px; border-radius: 4px; border: 1px solid #eee; margin-right: 5px; }
        .dropdown { position: relative; }
        .dropdown-menu { position: absolute; right: 0; top: 55px; background: white; box-shadow: var(--shadow); border-radius: 8px; display: none; padding: 10px; min-width: 150px; z-index: 100; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        
        .result-item { border-bottom: 1px solid var(--border); padding: 20px 0; }
        .char-head { font-size: 2.5rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; flex-wrap: wrap; }
        .reading-box { margin-bottom: 8px; display: flex; align-items: baseline; gap: 8px; }
        .label-tag { font-size: 0.85rem; color: #888; white-space: nowrap; }
        .bopomofo { font-size: 1.2rem; font-weight: 500; color: #2c3e50; }
        .mean-text { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-top: 10px; white-space: pre-wrap; font-size: 0.95rem; }
        
        .opt-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .opt-title { font-weight: bold; margin-bottom: 8px; display: block; color: var(--accent); }
        label { display: inline-flex; align-items: center; margin-right: 15px; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="sticky-top">
    <input type="text" id="searchInput" placeholder="ијёе…Ҙе–®еӯ—..." onkeypress="if(event.key==='Enter') doSearch()">
    <div class="dropdown">
        <button class="btn-settings" onclick="toggleMenu(event)">вҡҷпёҸ</button>
        <div id="dropdownMenu" class="dropdown-menu">
            <div style="padding:10px; cursor:pointer;" onclick="openSettings()">жҺЁе°ҺиЁӯзҪ®</div>
            <div style="padding:10px; border-top:1px solid #eee; color:#c0392b; cursor:pointer;" onclick="clearHistoryAndReload()">йҮҚзҪ®жүҖжңүиЁӯзҪ®</div>
            <div style="padding:10px; border-top:1px solid #eee; cursor:pointer;" onclick="location.reload()">йҮҚж–°ж•ҙзҗҶ</div>
        </div>
    </div>
</div>

<div id="results"></div>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal">
        <h3>йҹійҹ»жҺЁе°ҺиЁӯзҪ®</h3>
        
        <div class="opt-group">
            <span class="opt-title">йЎҜзӨәж–№жЎҲ</span>
            <label><input type="radio" name="displayMode" value="status" onchange="updateUI()"> еҺҹе§Ӣең°дҪҚ</label>
            <label><input type="radio" name="displayMode" value="bopomofo" checked onchange="updateUI()"> жҺЁе°ҺжӢји®Җ</label>
            <label><input type="radio" name="displayMode" value="orig" onchange="updateUI()"> еҺҹжӣёи®Җйҹі</label>
        </div>
        
        <div id="derivationOptions">
            <div class="opt-group">
                <span class="opt-title">жіЁйҹіж–№жЎҲ</span>
                <label><input type="radio" name="phoneticScheme" value="zhuyin"> жіЁйҹіз¬Ұиҷҹ</label>
                <label><input type="radio" name="phoneticScheme" value="roma" checked> жјўиӘһжӢјйҹі</label>
                <label><input type="radio" name="phoneticScheme" value="ipa"> еңӢйҡӣйҹіжЁҷ</label>
            </div>

            <div class="opt-group">
                <span class="opt-title">иҒІжҜҚжј”и®Ҡ</span>
                <label><input type="checkbox" class="opt" data-key="dropVng" checked> з–‘еҫ®и„«иҗҪ</label>
                <label><input type="checkbox" class="opt" data-key="palatalization" checked> иҰӢзі»йЎҺеҢ–</label>
                <label><input type="checkbox" class="opt" data-key="dropFw" checked> иј•е”ҮдёҚеҗҲ</label>
                <label><input type="checkbox" class="opt" data-key="riToEr" checked> ж—ҘжҜҚе…’еҢ–</label>
            </div>

            <div class="opt-group">
                <span class="opt-title">йҹ»жҜҚжј”и®Ҡ</span>
                <label><input type="checkbox" class="opt" data-key="zhuangSan" checked> иҺҠдёүеҢ–дәҢ</label>
                <label><input type="checkbox" class="opt" data-key="qiToI" checked> йҪҠйҹ»жӯёж”Ҝ</label>
                <label><input type="checkbox" class="opt" data-key="mergeDongGeng" checked> жқұеәҡеҗҲдҪө</label> 
                <label><input type="checkbox" class="opt" data-key="mergeRuRime" checked> е…ҘиҒІйҹ»еҗҲдҪө</label>
                <label><input type="checkbox" class="opt" data-key="simplifyShan" checked> з°ЎеҢ–еұұж”қ</label>
                <label><input type="checkbox" class="opt" data-key="mergeHamShan" checked> е’ёж”қе…Ҙеұұ</label>
            </div>

            <div class="opt-group">
                <span class="opt-title">иҒІиӘҝжЁЎејҸ</span>
                <label><input type="radio" name="toneMode" value="8"> е…«иӘҝ</label>
                <label><input type="radio" name="toneMode" value="7"> дёғиӘҝ</label>
                <label><input type="radio" name="toneMode" value="6"> е…ӯиӘҝ</label>
                <label><input type="radio" name="toneMode" value="5" checked> дә”иӘҝ</label>
            </div>
        </div>

        <div style="text-align:right; margin-top:20px;">
            <button onclick="closeSettings()" style="padding:8px 20px; border:none; background:#ddd; border-radius:5px; cursor:pointer;">еҸ–ж¶Ҳ</button>
            <button onclick="saveAndSearch()" style="padding:8px 20px; border:none; background:var(--accent); color:white; border-radius:5px; cursor:pointer; margin-left:10px;">жҮүз”ЁдёҰе„Іеӯҳ</button>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="config.js"></script>

<script>
// --- UI жҺ§еҲ¶ ---
function toggleMenu(e) { 
    e.stopPropagation(); 
    const m = document.getElementById('dropdownMenu'); 
    m.style.display = m.style.display === 'block' ? 'none' : 'block'; 
}

function openSettings() { document.getElementById('modalOverlay').style.display='flex'; updateUI(); }
function closeSettings() { document.getElementById('modalOverlay').style.display='none'; }

function updateUI() {
    const modeEl = document.querySelector('input[name="displayMode"]:checked');
    const mode = modeEl ? modeEl.value : 'bopomofo';
    const derivationOptions = document.getElementById('derivationOptions');
    // еҸӘжңүгҖҢжҺЁе°ҺжӢји®ҖгҖҚйЎҜзӨәеӯҗйҒёй …
    derivationOptions.style.display = (mode === 'bopomofo') ? 'block' : 'none';
}

function clearHistoryAndReload() {
    if(confirm("зўәе®ҡиҰҒйҮҚзҪ®жүҖжңүжҺЁе°ҺиЁӯзҪ®зӮәжҺЁи–Ұй»ҳиӘҚеҖје—Һпјҹ")) {
        localStorage.removeItem('phon_cfg');
        location.reload();
    }
}

window.onclick = () => { document.getElementById('dropdownMenu').style.display='none'; }

// --- ж ёеҝғйӮҸијҜ ---
function getActiveOptions() {
    const opts = {};
    // зҚІеҸ–еӢҫйҒёжЎҶ
    document.querySelectorAll('.opt').forEach(el => opts[el.dataset.key] = el.checked);
    // зҚІеҸ–йЎҜзӨәж–№жЎҲ
    const modeEl = document.querySelector('input[name="displayMode"]:checked');
    opts.displayMode = modeEl ? modeEl.value : 'bopomofo';
    // зҚІеҸ–жӢјйҹіж–№жЎҲ
    const schemeEl = document.querySelector('input[name="phoneticScheme"]:checked');
    opts.phoneticScheme = schemeEl ? schemeEl.value : 'roma';
    // зҚІеҸ–иҒІиӘҝжЁЎејҸ
    const toneEl = document.querySelector('input[name="toneMode"]:checked');
    opts.toneMode = toneEl ? toneEl.value : "5";
    
    return opts;
}

function saveAndSearch() {
    localStorage.setItem('phon_cfg', JSON.stringify(getActiveOptions()));
    closeSettings();
    doSearch();
}

function doSearch() {
    const inputChar = document.getElementById('searchInput').value.trim();
    const resultContainer = document.getElementById('results');
    resultContainer.innerHTML = '';
    if (!inputChar) return;

    const opts = getActiveOptions();
    const mode = opts.displayMode;
    const fragment = document.createDocumentFragment();
    let found = false;

    [...inputChar].forEach(key => {
        const items = DICT_DATA[key];
        if (items) {
            found = true;
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'result-item';

                let tags = [];
                if (item.йҷё && item.йҷё !== '/' && item.йҷё !== 'None') tags.push(`<span class="tag-item"><b style="color:#2980b9">гҖҗйҷёгҖ‘</b>${item.йҷё}</span>`);
                if (item.иҮә && item.иҮә !== '/' && item.иҮә !== 'None') tags.push(`<span class="tag-item"><b style="color:#27ae60">гҖҗиҮәгҖ‘</b>${item.иҮә}</span>`);
                if (item.з•° && item.з•° !== '/' && item.з•° !== 'None') tags.push(`<span class="tag-item"><b style="color:#e67e22">гҖҗз•°гҖ‘</b>${item.з•°}</span>`);
                const tagsHtml = tags.length ? `<div class="variant-tags">${tags.join(' ')}</div>` : '';

                let html = `<div class="char-head">${key} ${tagsHtml}</div>`;

                const process = (status) => {
                    if (!status || status === '/') return null;
                    if (status.includes('|')) return status.split('|').map(s => process(s)).join(' | ');
                    let cleanStatus = status.replace(/пјҲ[^пјү]+пјү/g, '').replace(/\([^)]+\)/g, '').trim();
                    return (typeof derivePhonology === 'function') ? derivePhonology(cleanStatus, opts) : status;
                };

                if (mode === 'orig') {
                    html += `<div class="reading-box"><span class="label-tag">гҖҗи®ҖйҹігҖ‘</span><span class="bopomofo">${item.orig || '/'}</span></div>`;
                } else if (mode === 'status') {
                    html += `<div class="reading-box"><span class="label-tag">гҖҗең°дҪҚгҖ‘</span><span class="bopomofo">${item.status || '/'}</span></div>`;
                    if (item.var && item.var !== '/') {
                        html += `<div class="reading-box"><span class="label-tag">гҖҗз•°ең°дҪҚгҖ‘</span><span class="bopomofo">${item.var}</span></div>`;
                    }
                } else {
                    const main = process(item.status);
                    if (main) html += `<div class="reading-box"><span class="label-tag">гҖҗи®ҖйҹігҖ‘</span><span class="bopomofo">${main}</span></div>`;
                    const v = process(item.var);
                    if (v) html += `<div class="reading-box"><span class="label-tag">гҖҗз•°и®ҖгҖ‘</span><span class="bopomofo">${v}</span></div>`;
                }

                html += `<div class="mean-text">${item.mean || 'жҡ«з„ЎйҮӢзҫ©'}</div>`;
                div.innerHTML = html;
                fragment.appendChild(div);
            });
        }
    });

    if (!found) {
        resultContainer.innerHTML = `<p style="padding:20px; color:#999;">жңӘж”¶йҢ„гҖҢ${inputChar}гҖҚгҖӮ</p>`;
    } else {
        resultContainer.appendChild(fragment);
    }
}

// й ҒйқўеҠ ијүеҲқе§ӢеҢ–
window.onload = () => {
    const saved = JSON.parse(localStorage.getItem('phon_cfg') || '{}');
    
    // еҰӮжһңжңүиҲҠзҙҖйҢ„пјҢжҒўеҫ©иҲҠзҙҖйҢ„пјӣеҗҰеүҮжңғдҝқжҢҒ HTML иЈЎзҡ„ checked зӢҖж…Ӣ
    if (saved.displayMode) {
        const el = document.querySelector(`input[name="displayMode"][value="${saved.displayMode}"]`);
        if (el) el.checked = true;
    }
    if (saved.phoneticScheme) {
        const el = document.querySelector(`input[name="phoneticScheme"][value="${saved.phoneticScheme}"]`);
        if (el) el.checked = true;
    }
    if (saved.toneMode) {
        const el = document.querySelector(`input[name="toneMode"][value="${saved.toneMode}"]`);
        if (el) el.checked = true;
    }
    
    document.querySelectorAll('.opt').forEach(el => {
        const key = el.dataset.key;
        if (saved.hasOwnProperty(key)) el.checked = saved[key];
    });

    updateUI();
};
</script>
</body>
</html>
